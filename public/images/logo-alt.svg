<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64">
      <stop offset="0%" stop-color="#0A0F2C"/>
      <stop offset="100%" stop-color="#1F1B4D"/>
    </linearGradient>

    <!-- Stroke Gradient -->
    <linearGradient id="stroke" x1="0" y1="0" x2="64" y2="64">
      <stop offset="0%" stop-color="#4CC9F0"/>
      <stop offset="100%" stop-color="#C77DFF"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#bg)"/>

  <!-- Icon -->
  <g stroke="url(#stroke)" stroke-width="3.2" stroke-linecap="round" filter="url(#glow)">
    <path d="M32 10V22.5C32 25.2 28.5 26.5 26.5 24.5L16 14"/>
    <path d="M54 32H41.5C38.8 32 37.5 28.5 39.5 26.5L50 16"/>
    <path d="M32 54V41.5C32 38.8 35.5 37.5 37.5 39.5L48 50"/>
    <path d="M10 32H22.5C25.2 32 26.5 35.5 24.5 37.5L14 48"/>
  </g>

  <!-- Center Dot -->
  <circle cx="32" cy="32" r="3.5" fill="#ffffff"/>
</svg>