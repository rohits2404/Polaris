<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="64" y2="64">
      <stop offset="0%" stop-color="#0A0F2C"/>
      <stop offset="100%" stop-color="#3A0CA3"/>
    </linearGradient>

    <!-- Glow Gradient -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4CC9F0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4CC9F0" stop-opacity="0"/>
    </radialGradient>

    <!-- Stroke Gradient -->
    <linearGradient id="strokeGradient" x1="0" y1="0" x2="64" y2="64">
      <stop offset="0%" stop-color="#4CC9F0"/>
      <stop offset="100%" stop-color="#C77DFF"/>
    </linearGradient>

    <!-- Soft Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#bgGradient)" filter="url(#shadow)"/>

  <!-- Glow -->
  <circle cx="32" cy="32" r="20" fill="url(#glow)"/>

  <!-- Central AI Symbol -->
  <g stroke="url(#strokeGradient)" stroke-width="2.5" stroke-linecap="round">
    <path d="M32 14 V26"/>
    <path d="M32 50 V38"/>
    <path d="M14 32 H26"/>
    <path d="M50 32 H38"/>
    
    <!-- Diagonals -->
    <path d="M20 20 L27 27"/>
    <path d="M44 20 L37 27"/>
    <path d="M20 44 L27 37"/>
    <path d="M44 44 L37 37"/>
  </g>

  <!-- Center Node -->
  <circle cx="32" cy="32" r="4" fill="#ffffff"/>
</svg>